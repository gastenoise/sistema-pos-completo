services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: laravel-pos-app
    container_name: pos_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - pos-network
    depends_on:
      - db
      - redis

  webserver:
    image: nginx:alpine
    container_name: pos_webserver
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - pos-network
    depends_on:
      - app

  db:
    image: postgres:17.9-alpine
    container_name: pos_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-openventa}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in backend/.env before starting docker-compose}
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    networks:
      - pos-network

  redis:
    image: redis:alpine
    container_name: pos_redis
    networks:
      - pos-network

  queue:
    image: laravel-pos-app
    container_name: pos_queue
    restart: unless-stopped
    command: php artisan queue:work --tries=3
    volumes:
      - ./:/var/www
    networks:
      - pos-network
    depends_on:
      - app
      - db

  scheduler:
    image: laravel-pos-app
    container_name: pos_scheduler
    restart: unless-stopped
    # En producción usar supervisord, aquí un loop simple para dev
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
    volumes:
      - ./:/var/www
    networks:
      - pos-network
    depends_on:
      - app

networks:
  pos-network:
    driver: bridge

volumes:
  dbdata: