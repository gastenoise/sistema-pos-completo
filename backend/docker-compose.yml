services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: laravel-pos-app
    container_name: pos_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    networks:
      - pos-network
    depends_on:
      - db
      - redis

  webserver:
    image: nginx:alpine
    container_name: pos_webserver
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - pos-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: pos_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: swift_pos
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_PASSWORD: ""
      # MYSQL_USER: root
      MYSQL_ALLOW_EMPTY_PASSWORD: 1
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - pos-network

  redis:
    image: redis:alpine
    container_name: pos_redis
    networks:
      - pos-network

  queue:
    image: laravel-pos-app
    container_name: pos_queue
    restart: unless-stopped
    command: php artisan queue:work --tries=3
    volumes:
      - ./src:/var/www
    networks:
      - pos-network
    depends_on:
      - app
      - db

  scheduler:
    image: laravel-pos-app
    container_name: pos_scheduler
    restart: unless-stopped
    # En producción usar supervisord, aquí un loop simple para dev
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
    volumes:
      - ./src:/var/www
    networks:
      - pos-network
    depends_on:
      - app

networks:
  pos-network:
    driver: bridge

volumes:
  dbdata: