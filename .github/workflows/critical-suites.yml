name: Critical Test Suites

on:
  pull_request:
    branches: ["**"]
  push:
    branches: ["main", "master", "develop"]

jobs:
  backend-critical:
    name: Backend critical contracts + golden path
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist
      - name: Prepare env
        run: |
          cp .env.example .env
          php artisan key:generate
      - name: Run critical backend suites
        run: php artisan test --testsuite=Feature,Unit --filter="ItemImportContractTest|CashRegisterContractTest|SaleCloseVoidContractTest|GoldenPathE2ETest|RecentItemUsageServiceTest"

  frontend-critical:
    name: Frontend critical hooks + modular utils
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Run critical frontend suites
        run: node --test src/modules/**/**/*.test.js src/lib/*.test.js src/hooks/*.test.js src/api/*.test.js
