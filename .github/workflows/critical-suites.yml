name: Critical Test Suites

on:
  pull_request:
    branches: ["**"]
  push:
    branches: ["main", "master", "develop"]

jobs:
  backend-critical:
    name: Backend critical contracts + golden path
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist
      - name: Prepare env
        run: |
          cp .env.example .env
          php artisan key:generate
      - name: Run critical backend suites
        run: php artisan test --testsuite=Feature,Unit --filter="ItemImportContractTest|CashRegisterContractTest|SaleCloseVoidContractTest|GoldenPathE2ETest|RecentItemUsageServiceTest|SanctumCsrfSessionLoginTest"

  frontend-critical:
    name: Frontend critical hooks + modular utils
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Enable Corepack
        run: corepack enable
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
          run_install: false
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run critical frontend suites
        run: pnpm run test:critical
